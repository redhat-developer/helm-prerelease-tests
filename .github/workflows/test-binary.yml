name: Helm Binary Tests

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Konflux image to test (overrides image.env)'
        required: false
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extract:
    name: Extract binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image reference
        id: image
        run: |
          if [[ -n "${{ github.event.inputs.image_sha }}" ]]; then
            echo "ref=${{ github.event.inputs.image_sha }}" >> "$GITHUB_OUTPUT"
          else
            source image.env
            echo "ref=${BINARY_IMAGE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull image and extract all binaries
        run: |
          mkdir -p binaries
          docker create --name extract --platform linux/amd64 "${{ steps.image.outputs.ref }}"
          docker cp extract:/releases/. binaries/
          docker rm extract
          ls -lh binaries/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: helm-binaries
          path: binaries/
          retention-days: 1

  test:
    needs: extract
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-15
            platform: darwin-amd64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-amd64
          - os: windows-11-arm
            platform: windows-arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}
    env:
      HELM_PLATFORM: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: helm-binaries
          path: helm-binary-test/

      - name: Remove quarantine (macOS)
        if: runner.os == 'macOS'
        run: xattr -dr com.apple.quarantine helm-binary-test/ 2>/dev/null || true

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x helm-binary-test/helm-*

      - name: Create kind cluster
        if: runner.os == 'Linux'
        uses: helm/kind-action@v1
        with:
          cluster_name: helm-test

      - name: Create results directory
        shell: bash
        run: mkdir -p test-results

      - name: Run 01-validation
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/01-validation.sh 2>&1 | tee ../test-results/01-validation.log

      - name: Run 02-smoke
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/02-smoke.sh 2>&1 | tee ../test-results/02-smoke.log

      - name: Run 03-dependencies
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/03-dependencies.sh 2>&1 | tee ../test-results/03-dependencies.log

      - name: Run 04-functionality-offline
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/04-functionality-offline.sh 2>&1 | tee ../test-results/04-functionality-offline.log

      - name: Run 05-functionality-cluster
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/05-functionality-cluster.sh 2>&1 | tee ../test-results/05-functionality-cluster.log

      - name: Run 06-oci
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/06-oci.sh 2>&1 | tee ../test-results/06-oci.log

      - name: Run 07-v4-features-offline
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/07-v4-features-offline.sh 2>&1 | tee ../test-results/07-v4-features-offline.log

      - name: Run 08-v4-features-cluster
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/08-v4-features-cluster.sh 2>&1 | tee ../test-results/08-v4-features-cluster.log

      - name: Run 09-distribution
        shell: bash
        working-directory: helm-binary-test
        run: bash ../scripts/09-distribution.sh 2>&1 | tee ../test-results/09-distribution.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.platform }}
          path: test-results/
          retention-days: 30
